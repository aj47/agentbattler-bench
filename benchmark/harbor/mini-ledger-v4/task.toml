schema_version = "1.4"
multi_step_reward_strategy = "final"
artifacts = [{ source = "/app", destination = "candidate" }]

[task]
name = "agentbattler/mini-ledger-v4"
version = "4.1.0"
description = "Fifteen-turn long-horizon deterministic ledger challenge"

[metadata]
benchmark = "AgentBattler"
challenge = "mini-ledger-v4"
harbor_version = "0.20.0"
visible_points = 70
holdout_points = 30

[agent]
timeout_sec = 1800.0
network_mode = "public"

[verifier]
timeout_sec = 600.0
environment_mode = "separate"

[verifier.environment]
# Harbor 0.20's Docker provider rejects no-network for separate verifier
# environments. Filesystem isolation is enforced by the separate container;
# the verifier has no credentials and makes no network requests.
network_mode = "public"
workdir = "/"
cpus = 4
memory_mb = 4096
storage_mb = 4096

[environment]
network_mode = "public"
workdir = "/app"
cpus = 4
memory_mb = 4096
storage_mb = 8192

[[steps]]
name = "01-foundation"

[steps.agent]
timeout_sec = 1800.0

[steps.verifier]
timeout_sec = 600.0

[steps.verifier.env]
AGENTBATTLER_STAGE_ID = "foundation"
AGENTBATTLER_STAGE_POINTS = "3"
AGENTBATTLER_FINAL_STEP = "0"

